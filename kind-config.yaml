kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# The fix: move apiServerCertSANs inside the networking.apiServer block
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
# apiServer configuration goes under the KubeadmConfigPatches or specifically for certs:
kubeadmConfigPatches:
- |
  kind: ClusterConfiguration
  apiServer:
    certSANs:
      - "docker-host"
      - "localhost"
nodes:
  - role: control-plane